## Settings file was created by plugin Spawn Cycle Fixes v1.0.0
## Plugin GUID: butterystancakes.lethalcompany.spawncyclefixes

[Enemies]

## When unplugging the apparatus, any Old Birds that spawn will now add to the power count and number of Old Birds, preventing outside spawns from "overflowing" past the intended maximum values.
## Old Birds will also be blocked from spawning once all the dormant ones on the map have "woken up", preventing an issue where they can pop up out of nowhere with no spawn animation.
# Setting type: Boolean
# Default value: true
Limit Old Birds = true

## Mask hornets do not add power level since they spawn in a non-standard way, from killing butlers. Enabling this will fix that.
## In vanilla, mask hornets and butlers have the same power level (of 2), so enabling this will prevent enemies from spawning to replace dead butlers.
# Setting type: Boolean
# Default value: false
Mask Hornets Power = true

[Miscellaneous]

## Fixes two spawn waves occurring at the start of each day, and also fixes vent timers overlapping future spawn waves which delays them until later in the day.
## With this setting enabled, spawn waves will always occur at 7:39 AM, 9:00 AM, 11:00 AM, 1:00 PM, 3:00 PM, 5:00 PM, 7:00 PM, 9:00 PM, and 11:00 PM.
# Setting type: Boolean
# Default value: true
Consistent Spawn Times = true

## Prevents enemy spawn weight from exceeding 100 (the intended maximum) if its spawn curves would normally allow it to do so.
## This will prevent some enemy types (ex: baboon hawks on Adamance, nutcrackers on Rend) from spawning out of control on certain maps.
# Setting type: MoonFilter
# Default value: VanillaMoonsOnly
# Acceptable values: Off, VanillaMoonsOnly, Always
Limit Spawn Chance = Always

