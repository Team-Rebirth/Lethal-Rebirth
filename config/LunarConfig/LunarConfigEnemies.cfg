# Default value: false
Configure Content = true

## These are the names which LunarConfig will recognize as this object in other config options.
## They are case-insensitve and do not regard whitespace.
# Setting type: String
# Default value: Spring, Coil-head, Spring
Appropriate Aliases = Spring, Coil-head, Spring

## The maximum amount of an enemy that can be alive.
# Setting type: Int32
# Default value: 5
Max Count = 5

## The power level an enemy occupies.
# Setting type: Single
# Default value: 1
Power Level = 2

## The amount of entities that will spawn of this type at once.
## NOTICE: In order for this setting to work, you may need VentSpawnFixes or a similar mod.
# Setting type: Int32
# Default value: 0
Group Spawn Count = 0

## The amount of HP an enemy has.
# Setting type: Int32
# Default value: 3
Enemy HP = 3

## Whether or not an enemy can die.
# Setting type: Boolean
# Default value: false
Can Die? = false

## Whether or not an enemy is destroyed on death.
# Setting type: Boolean
# Default value: false
Destroy On Death? = false

## Whether or not an enemy can be destroyed.
# Setting type: Boolean
# Default value: true
Can Destroy? = true

## Whether or not an enemy can be stunned.
## WARNING: Enabling this for enemies that have it disabled by default will likely cause issues, as the enemy most likely does not have stunning mechanics.
# Setting type: Boolean
# Default value: true
Can Stun? = true

## Modifies the duration this enemy stays stunned.
# Setting type: Single
# Default value: 3.25
Stun Time = 3.25

## The keyword to view the bestiary entry of an enemy.
# Setting type: String
# Default value: coil-heads
Bestiary Keyword = coil-heads

## Tags allocated to the enemy.
## Separate tags with commas.
# Setting type: String
# Default value: lethal_level_loader:hostile, lethal_level_loader:biped, lethal_level_loader:medium, lethal_level_loader:vanilla, lethal_company:biped, lethal_company:hostile
Tags = lethal_level_loader:hostile, lethal_level_loader:biped, lethal_level_loader:medium, lethal_level_loader:vanilla, lethal_company:biped, lethal_company:hostile

